<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .navbar {
            background-color: #003366;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            padding: 20px;
        }
        .welcome {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 30%;
            text-align: center;
            margin: 10px;
        }
        .card h3 {
            color: #003366;
            margin-bottom: 10px;
        }
        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .menu a {
            text-decoration: none;
            background-color: #003366;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
        }
        .menu a:hover {
            background-color: #002244;
        }
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
                align-items: center;
            }
            .card {
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">SCMIRT Library - Student Dashboard</div>
    
    <div class="container">
        <div class="welcome">
            Welcome, <span id="studentName">Student</span>! 📚
        </div>

        <div class="menu">
            <a href="#">📖 Browse Books</a>
            <a href="#">📚 My Borrowed Books</a>
            <a href="#">👤 Profile</a>
            <a href="login.html">🚪 Logout</a>
        </div>

        <div class="dashboard">
            <div class="card">
                <h3>📚 Total Books</h3>
                <p>1200+</p>
            </div>
            <div class="card">
                <h3>📖 Borrowed Books</h3>
                <p>5</p>
            </div>
            <div class="card">
                <h3>⏳ Due Books</h3>
                <p>2</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("studentName").innerText = "John Doe"; // Replace with dynamic data
    </script>
</body>
</html>
